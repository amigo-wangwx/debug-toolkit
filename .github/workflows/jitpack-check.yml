name: JitPack Check

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:

jobs:
  publish-to-maven-local:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - run: chmod +x gradlew
      - run: ./gradlew publishToMavenLocal --console=plain
